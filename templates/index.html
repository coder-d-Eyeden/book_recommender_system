<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style="background-color: black;">
    <nav class="navbar" style="background-color: aquamarine;">
        <a class="navbar-brand"> My Book Recommender</a>
        <ul class="nav navbar-nav">
            <li><a href="">Home</a></li>
            <li><a href="">Recommend</a></li>
            <li><a href="">Contact</a></li>
        </ul>

    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1 class="text-white">Top 50 Books</h1>
            </div>
            
            <div class="mb-4">
                <form class="d-flex">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input class="form-control" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-primary" type="submit">Search</button>
                    </div>
                </form>
            </div>

            <div class="col-3">
                <div class="card">
                    <div class="card-body">
                        <img class="card-img-top" src="http://images.amazon.com/images/P/0439136350.01.MZZZZZZZ.jpg" alt="">
                        <h3>Harry Potter</h3>
                    </div>
                </div>
            </div>
            

            



        </div>
    </div>
    
    
</body>
</html>
