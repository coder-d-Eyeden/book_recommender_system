<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
    .text-white{
        color: white
    }
</style>

<body style="background-color: black;">
    <nav class="navbar" style="background-color: aquamarine;">
        <a class="navbar-brand"> My Book Recommender</a>
        <ul class="nav navbar-nav">
            <li><a href="">Home</a></li>
            <li><a href="">Recommend</a></li>
            <li><a href="">Contact</a></li>
        </ul>

    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-white" style="font-size: 50px;">Top 50 Books</h1>
            </div>
            
            <div class="mb-4" style="margin-top: 50px;">
                <form class="d-flex">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input class="form-control" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-primary" type="submit">Search</button>
                    </div>
                </form>
            </div>

            {% for i in range(book_name|length) %}
               <div class="col-3" style="margin-top: 30px;">
                <div class="card">
                    <div class="card-body">
                        <img class="card-img-top" src="http://images.amazon.com/images/P/0439136350.01.MZZZZZZZ.jpg" alt="">
                        <h2 class=>Harry Potter</h2>
                        <h4 class=>J K  Rowling</h4>
                        <h4 class=>Votes - 300</h4>
                        <h4 class=>Rating 5.6</h4>
                    </div>
                </div>
                </div>
            {% endfor %}



        </div>
    </div>
    
    
</body>
</html>
